<script>
  const numeros = [14, 25, 36, 44, 58];
  filtradosMapeados = numeros
    .filter(numero => numero % 2 === 0)
    .map(numero => numero * 10);

  // const dobrados = numeros.map(numero => numero * 10);

  document.write(`Números originais: ${numeros} <br>`);
  // document.write(`Números dobrados: ${dobrados} <br>`);
  document.write(`Números pares mapeados: ${filtradosMapeados} <br>`);

</script>
